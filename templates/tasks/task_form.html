{% extends 'base.html' %}

{% block title %}{{ title }} – Health-Aware Task Manager{% endblock %}

{% block content %}
<div class="card">
  <h2>{{ title }}</h2>
  <form method="post" action="">
    {% csrf_token %}
    {% for field in form %}
    <div class="form-group">
      <label for="{{ field.id_for_label }}">{{ field.label }}</label>
      {{ field }}
      {% if field.errors %}<span style="color:var(--priority-high);font-size:13px;">{{ field.errors.0 }}</span>{% endif %}
    </div>
    {% endfor %}
    <div style="display:flex;gap:10px;margin-top:16px;">
      <button type="submit" class="btn btn-primary">Save</button>
      <a href="{% url 'tasks:home' %}" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
